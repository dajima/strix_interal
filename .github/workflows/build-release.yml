name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - name: Build (Linux — Docker)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Build binary via Dockerfile.build
          docker build -f Dockerfile.build -t strix-builder:${VERSION} .
          docker create --name strix-builder-${VERSION} strix-builder:${VERSION}
          docker cp strix-builder-${VERSION}:/output/strix dist/strix
          docker rm strix-builder-${VERSION}

          chmod +x dist/strix

          mkdir -p dist/release
          BINARY_NAME="strix-${VERSION}-linux-x86_64"
          cp dist/strix "dist/release/${BINARY_NAME}"
          chmod +x "dist/release/${BINARY_NAME}"
          tar -czf "dist/release/${BINARY_NAME}.tar.gz" -C dist/release "${BINARY_NAME}"

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv sync --frozen
          uv run pyinstaller strix.spec --noconfirm

          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          mkdir -p dist/release

          BINARY_NAME="strix-${VERSION}-windows-x86_64"
          cp dist/strix.exe "dist/release/${BINARY_NAME}.exe"
          (cd dist/release && 7z a "${BINARY_NAME}.zip" "${BINARY_NAME}.exe")

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: strix-${{ matrix.target }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.zip
          if-no-files-found: error

  sandbox:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Sandbox Image
        shell: bash
        run: |
          bash build_script/build-sandbox.sh --push

  release:
    needs: [build, sandbox]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate Checksums
        shell: bash
        run: |
          cd release
          sha256sum * > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: |
            release/*
